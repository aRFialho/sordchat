services:
  - type: web
    name: sordchat-api
    runtime: python
    plan: free
    rootDir: backend
    autoDeployTrigger: off
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn sordchat_fixed:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGINS
        sync: false
      - key: AUTO_SEED_USERS
        value: "false"

  - type: web
    name: sordchat-web
    runtime: static
    rootDir: sordchat-frontend
    autoDeployTrigger: off
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_WS_URL
        sync: false
      - key: REACT_APP_DESKTOP_DOWNLOAD_URL
        sync: false
